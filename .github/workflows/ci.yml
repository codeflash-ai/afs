name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  linux:
    name: Linux tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            fuse3 \
            libglib2.0-dev \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf
      - name: Report Linux FUSE coverage
        run: |
          if [ -e /dev/fuse ]; then
            echo "::notice::/dev/fuse is present. This workflow currently runs virtual filesystem behavior tests, not a real mounted FUSE smoke test."
          else
            echo "::warning::/dev/fuse is not present. Real online-only FUSE mount smoke is not covered by this hosted runner."
          fi
      - name: Check Rust formatting
        run: cargo fmt --all -- --check
      - name: Run Rust tests
        run: cargo test --workspace --all-targets
      - name: Install desktop dependencies
        run: npm ci
        working-directory: apps/desktop
      - name: Build desktop web UI
        run: npm run build
        working-directory: apps/desktop

  macos:
    name: macOS tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - name: Report macOS File Provider coverage
        run: |
          echo "::warning::This hosted macOS job compiles the File Provider code, but does not register a real File Provider domain. Real online-only File Provider smoke needs a signed app/extension and macOS user approval."
      - name: Run Rust tests
        run: cargo test --workspace --all-targets
      - name: Build macOS File Provider package
        run: swift build --package-path platform/macos/AgentFSFileProvider
      - name: Install desktop dependencies
        run: npm ci
        working-directory: apps/desktop
      - name: Build desktop web UI
        run: npm run build
        working-directory: apps/desktop
